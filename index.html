<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0c0e11">
  <title>Bảng Tin</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="description" content="Bảng tin cá nhân: AI, GitHub trending, công nghệ, chứng khoán Việt Nam và xu hướng TikTok. Tự cập nhật 2 lần mỗi ngày.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,600..800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    (() => {
      try {
        const theme = localStorage.getItem("theme");
        if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark-theme");
        }
      } catch (e) {
        // Fallback to system preference if localStorage is blocked
        if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
          document.documentElement.classList.add("dark-theme");
        }
      }
    })();
  </script>
</head>
<body>

<header class="masthead container">
  <div class="masthead-top">
    <h1>Bảng tin<span class="dot">.</span></h1>
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Đổi giao diện" onclick="(() => {
      const isDark = document.documentElement.classList.toggle('dark-theme');
      try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch (e) {}
    })()">
      <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
      </svg>
      <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
      </svg>
    </button>
  </div>
  <p class="masthead-date" id="today"></p>
  <div class="update-badges" id="update-badges"></div>
</header>

<nav class="nav">
  <div class="container nav-inner" id="nav">
    <a href="#danh-muc">Danh mục</a>
    <a href="#ai">Tin AI</a>
    <a href="#github">GitHub</a>
    <a href="#tiktok">TikTok</a>
    <a href="#cong-nghe">Công nghệ</a>
  </div>
</nav>

<main class="container">

  <section id="danh-muc">
    <div class="section-head">
      <h2>Danh mục &amp; thị trường</h2>
      <span class="side-note" id="session-note"></span>
    </div>
    <div id="market-body">
      <!-- Premium structure-matching skeletons -->
      <div class="skeleton-hero shimmer"></div>
      <div class="holdings-grid">
        <div class="skeleton-card shimmer"></div>
        <div class="skeleton-card shimmer"></div>
      </div>
    </div>
  </section>

  <section id="ai">
    <div class="section-head">
      <h2>Tin AI</h2>
    </div>
    <div id="ai-body">
      <div class="ai-grid">
        <div class="skeleton-card shimmer" style="grid-column: 1 / -1; height: 160px;"></div>
        <div class="skeleton-card shimmer"></div>
        <div class="skeleton-card shimmer"></div>
      </div>
    </div>
  </section>

  <section id="github">
    <div class="section-head">
      <h2>GitHub trending</h2>
    </div>
    <div id="github-body">
      <div class="gh-cols">
        <div class="gh-col">
          <div class="skeleton-title shimmer" style="width: 30%"></div>
          <div class="skeleton-row shimmer"></div>
          <div class="skeleton-row shimmer"></div>
          <div class="skeleton-row shimmer"></div>
        </div>
        <div class="gh-col">
          <div class="skeleton-title shimmer" style="width: 30%"></div>
          <div class="skeleton-row shimmer"></div>
          <div class="skeleton-row shimmer"></div>
          <div class="skeleton-row shimmer"></div>
        </div>
      </div>
    </div>
  </section>

  <section id="tiktok">
    <div class="section-head">
      <h2>Xu hướng TikTok</h2>
      <span class="side-note">lọc theo kênh @tracuami</span>
    </div>
    <div id="tiktok-body">
      <div class="tiktok-grid">
        <div class="skeleton-card shimmer" style="grid-column: 1 / -1; height: 160px;"></div>
        <div class="skeleton-card shimmer"></div>
        <div class="skeleton-card shimmer"></div>
      </div>
    </div>
  </section>

  <section id="cong-nghe">
    <div class="section-head">
      <h2>Công nghệ</h2>
    </div>
    <div id="tech-body">
      <div class="row-list">
        <div class="skeleton-row shimmer"></div>
        <div class="skeleton-row shimmer"></div>
        <div class="skeleton-row shimmer"></div>
      </div>
    </div>
  </section>

</main>

<footer>
  <div class="container">
    Cập nhật tự động lúc 7h00 và 15h30 mỗi ngày · <a href="https://github.com/ckiucuaha-dotcom/bang-tin" rel="noopener">Nguồn dữ liệu</a>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>
